query ListDairyProducts @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it lists available dairy products.") {
  dairyProducts {
    id
    name
    description
    price
    quantity
  }
}

mutation CreateDairyProduct($name: String!, $description: String, $price: Float!, $quantity: Int!) @auth(level: USER, insecureReason: "This operation allows logged-in users to add new dairy products to the inventory.") {
  dairyProduct: dairyProduct_insert(data: {
    name: $name,
    description: $description,
    price: $price,
    quantity: $quantity
  })
}

mutation UpdateDairyProduct($id: ID!, $name: String, $description: String, $price: Float, $quantity: Int) @auth(level: USER, insecureReason: "This operation allows logged-in users to update existing dairy product details.") {
  dairyProduct: dairyProduct_update(key: {id: $id}, data: {
    name: $name,
    description: $description,
    price: $price,
    quantity: $quantity
  })
}

query GetDairyProductById($id: ID!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it retrieves details of a specific dairy product.") {
  dairyProduct(key: {id: $id}) {
    id
    name
    description
    price
    quantity
  }
}